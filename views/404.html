<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 – Uni-Connect Westminster</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--p:#7c3aed;--bg:#f8fafc;--text:#0f172a;--muted:#64748b;--border:#e2e8f0}
    body{font-family:Inter,-apple-system,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
    .code{font-size:96px;font-weight:900;color:var(--p);line-height:1;margin-bottom:16px}
    h1{font-size:24px;font-weight:800;color:var(--text);margin-bottom:10px}
    p{font-size:15px;color:var(--muted);margin-bottom:32px}
    a{background:var(--p);color:#fff;padding:12px 24px;border-radius:12px;text-decoration:none;font-weight:800;font-size:14px;transition:.2s}
    a:hover{background:#5b21b6}
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist.</p>
  <a href="/dashboard">Go to Dashboard</a>
</body>
</html>
